name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Preflight release context
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "Git ref: ${GITHUB_REF}"
          echo "Git sha: ${GITHUB_SHA}"
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> "$GITHUB_ENV"
          echo "LOCAL_VERSION=${LOCAL_VERSION}" >> "$GITHUB_ENV"
          echo "Local package: ${PACKAGE_NAME}@${LOCAL_VERSION}"
          echo "Registry: $(npm config get registry)"
          npm whoami
          echo "Published before release:"
          npm view "${PACKAGE_NAME}" version || echo "No published version found yet"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release

      - name: Push release tags
        run: git push origin --tags

      - name: Verify published version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISHED_VERSION=""
          for _ in $(seq 1 18); do
            PUBLISHED_VERSION=$(npm view "${PACKAGE_NAME}" version 2>/dev/null || true)
            if [ "${PUBLISHED_VERSION}" = "${LOCAL_VERSION}" ]; then
              echo "Published version verified: ${PACKAGE_NAME}@${PUBLISHED_VERSION}"
              exit 0
            fi
            echo "Waiting for npm registry propagation... current='${PUBLISHED_VERSION}' expected='${LOCAL_VERSION}'"
            sleep 10
          done

          echo "Release verification failed. Expected ${PACKAGE_NAME}@${LOCAL_VERSION}, got '${PUBLISHED_VERSION}'"
          exit 1
